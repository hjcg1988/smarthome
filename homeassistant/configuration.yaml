# Home Assistant Configuration for Humberto's Smart Home

homeassistant:
  name: Casa Humberto
  time_zone: America/Los_Angeles
  unit_system: imperial
  temperature_unit: F
  allowlist_external_dirs:
    - /config/snapshots
  packages: !include_dir_named packages

# Core integrations
default_config:
api:
http:
mobile_app:

# Logger
logger:
  default: warning
  logs:
    homeassistant.components.automation: debug
    homeassistant.components.telegram_bot: debug
    homeassistant.components.shell_command: debug

# Input Boolean for Silence Mode
input_boolean:
  ring_silence:
    name: "Ring Silence Mode"
    icon: mdi:bell-off

# Input to track last notification time (separate cooldowns for motion and ding)
input_datetime:
  ring_last_motion:
    name: "Ring Last Motion"
    has_date: true
    has_time: true
  ring_last_ding:
    name: "Ring Last Ding"
    has_date: true
    has_time: true

# Input to track last motion eventId (prevent duplicate events)
input_text:
  ring_last_event_id:
    name: "Ring Last Event ID"
    min: 0
    max: 255
    initial: "none"

# Shell Commands
shell_command:
  ring_silence_60: "echo 'Ring silence activated for 60 minutes'"
  ring_get_snapshot: "python3 /config/scripts/get_ring_snapshot.py {{ path }}"
  ring_get_video_frame: "python3 /config/scripts/ring_video_frame.py '{{ url }}' '{{ path }}'"

# Telegram Notifications
notify:
  - name: telegram
    platform: telegram
    chat_id: 8514988238

# Automations
automation: !include automations.yaml
